services:
  - type: web
    name: exam-generator-api
    runtime: python
    plan: free
    # Deploy close to the primary (EU / North Africa) user base to cut latency
    # and keep data in the EU for GDPR. Change if your audience shifts.
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      # Logging verbosity for the app's structured logs (used for monitoring).
      - key: LOG_LEVEL
        value: INFO
      # --- Secrets: set these in the Render dashboard (sync:false = not in git) ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SUPER_ADMIN_EMAILS
        sync: false
      # --- Set this AFTER the Vercel frontend is deployed (its https URL) ---
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPENROUTER_REFERER
        sync: false
      # Plan quotas (optional overrides; defaults are Free=3 / Pro=50).
      - key: PER_USER_EXAM_LIMIT_FREE
        value: "3"
      - key: PER_USER_EXAM_LIMIT_PRO
        value: "50"
      # Lemon Squeezy billing (set in dashboard after creating the Pro product).
      - key: LEMONSQUEEZY_API_KEY
        sync: false
      - key: LEMONSQUEEZY_STORE_ID
        sync: false
      - key: LEMONSQUEEZY_PRO_VARIANT_ID
        sync: false
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        sync: false
      - key: BILLING_SUCCESS_URL
        sync: false
      - key: BILLING_CANCEL_URL
        sync: false
